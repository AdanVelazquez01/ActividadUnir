<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header>
    <h1>Vida Saludable y Sencilla</h1>
    <p>Cómo estar sano sin ser un loco del gimnasio</p>
  </header>

  <main>
    
<div class="login-container" style="max-width: 400px; margin: 2rem auto; text-align: center; padding: 2rem; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
  <h2>Inicia Sesión</h2>
  <p>Accede a tu panel saludable</p>
  <form id="loginForm" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
    <input type="text" id="username" placeholder="Usuario" required style="padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px;">
    <input type="password" id="password" placeholder="Contraseña" required style="padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px;">
    <button type="submit" style="background: var(--primary-color); color: white; border: none; padding: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold;">Entrar</button>
  </form>
  <p id="errorMsg" style="color: red; margin-top: 1rem; display: none;">Usuario o contraseña incorrectos</p>
</div>

<script src="assets/js/login.js"></script>

  </main>

  <footer>
    <p>David Uriel Espinosa velazquez - UNIR</p>
  </footer>
</body>
</html>
